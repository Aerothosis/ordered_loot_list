name: Package Addon

on:
  push:
    tags:
      - 'v*' # Trigger when a new tag with a version is pushed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v1.2.3)'
        required: true
        type: string
      skip_upload:
        description: 'Skip the Upload Release step'
        required: false
        type: boolean
        default: true

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # Fetch all history for tags
                
            # Generate addon .zip package using the .pkgmeta file
            - name: Package with .pkgmeta
              uses: BigWigsMods/packager@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                SKIP_UPLOAD: true

            - name: Fix internal zip folder name
              run: |
                cd .release
                for zip in *.zip; do
                  tmpdir=$(mktemp -d)
                  unzip -q "$zip" -d "$tmpdir"
                  inner=$(ls "$tmpdir")
                  if [ "$inner" != "OrderedLootList" ]; then
                    mv "$tmpdir/$inner" "$tmpdir/OrderedLootList"
                    rm "$zip"
                    (cd "$tmpdir" && zip -qr - OrderedLootList) > "$zip"
                  fi
                  rm -rf "$tmpdir"
                done

            - name: Rename zip to version only
              run: |
                VERSION="${{ github.event.inputs.version || github.ref_name }}"
                cd .release
                for zip in *.zip; do
                  mv "$zip" "${VERSION}.zip"
                done

            - name: Upload release
              if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_upload != 'true' }}
              uses: softprops/action-gh-release@v2
              with:
                files: .release/*.zip
                prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'dev') }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}